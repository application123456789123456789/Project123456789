services:

  nginx:
    image: nginx:1.25-alpine
    container_name: lb_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lb_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lb_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:DBMo1cIDwDgvZuAGBOgzprP1bOxvtjOKZegOspEE8l0=
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dispatcher
      DB_USERNAME: dispatcher
      DB_PASSWORD: secret
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      NODE_SERVER_A: http://node-a:3001
      NODE_SERVER_B: http://node-b:3002
      NODE_SERVER_C: http://node-c:3003
      NODE_SERVER_D: http://node-d:3004
      NODE_SERVER_E: http://node-e:3005
    depends_on:
      - redis
      - mysql
      - node-a
      - node-b
      - node-c
      - node-d
      - node-e
    networks:
      - lb_network

  mysql:
    image: mysql:8.0
    container_name: lb_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: dispatcher
      MYSQL_USER: dispatcher
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lb_network

  redis:
    image: redis:7-alpine
    container_name: lb_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - lb_network

  node-a:
    image: node:20-alpine
    container_name: lb_node_a
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./node-server:/app
    environment:
      NODE_ID: server-a
      PORT: "3001"
      BASE_LATENCY: "45"
      BASE_CPU: "40"
    command: node server.js
    networks:
      - lb_network

  node-b:
    image: node:20-alpine
    container_name: lb_node_b
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./node-server:/app
    environment:
      NODE_ID: server-b
      PORT: "3002"
      BASE_LATENCY: "12"
      BASE_CPU: "20"
    command: node server.js
    networks:
      - lb_network

  node-c:
    image: node:20-alpine
    container_name: lb_node_c
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./node-server:/app
    environment:
      NODE_ID: server-c
      PORT: "3003"
      BASE_LATENCY: "28"
      BASE_CPU: "65"
    command: node server.js
    networks:
      - lb_network

  node-d:
    image: node:20-alpine
    container_name: lb_node_d
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./node-server:/app
    environment:
      NODE_ID: server-d
      PORT: "3004"
      BASE_LATENCY: "18"
      BASE_CPU: "30"
    command: node server.js
    networks:
      - lb_network

  node-e:
    image: node:20-alpine
    container_name: lb_node_e
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./node-server:/app
    environment:
      NODE_ID: server-e
      PORT: "3005"
      BASE_LATENCY: "9"
      BASE_CPU: "8"
    command: node server.js
    networks:
      - lb_network

networks:
  lb_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  mysql_data:
    driver: local
